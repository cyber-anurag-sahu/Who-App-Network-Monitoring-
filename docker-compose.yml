version: "3.9"

name: whoapp

x-common-env: &common-env
  REDIS_URL: redis://redis:6379
  INFLUX_URL: http://influxdb:8086
  INFLUX_TOKEN: ${INFLUX_TOKEN:-whoapp-super-secret-token}
  INFLUX_ORG: ${INFLUX_ORG:-whoapp}
  INFLUX_BUCKET: ${INFLUX_BUCKET:-network_flows}
  CAPTURE_INTERFACE: ${CAPTURE_INTERFACE:-eth0}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  # ── Core infrastructure ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whoapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: whoapp-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-whoapp1234}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-whoapp}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-network_flows}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-whoapp-super-secret-token}
    volumes:
      - influx_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── WhoApp services ─────────────────────────────────────────────────────────
  capture:
    build:
      context: ./capture
      dockerfile: Dockerfile
    container_name: whoapp-capture
    environment:
      <<: *common-env
    network_mode: host          # required for raw packet capture
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./capture:/app
      - pcap_data:/pcaps
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["live"]          # only starts with --profile live

  identity:
    build:
      context: ./identity
      dockerfile: Dockerfile
    container_name: whoapp-identity
    environment:
      <<: *common-env
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./identity:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["live"]

  fingerprint:
    build:
      context: ./fingerprint
      dockerfile: Dockerfile
    container_name: whoapp-fingerprint
    environment:
      <<: *common-env
    networks:
      - whoapp-net
    volumes:
      - ./fingerprint:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: whoapp-engine
    environment:
      <<: *common-env
      RULES_PATH: /app/rules/whoapp_rules.yaml
    networks:
      - whoapp-net
    volumes:
      - ./engine:/app
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  pipeline:
    build:
      context: .          # root context so Dockerfile can COPY from sibling dirs
      dockerfile: pipeline/Dockerfile
    container_name: whoapp-pipeline
    environment:
      <<: *common-env
    networks:
      - whoapp-net
    depends_on:
      redis:
        condition: service_healthy
      fingerprint:
        condition: service_started
      engine:
        condition: service_started
    restart: unless-stopped

  ws-bridge:
    build:
      context: .          # root context (shared Dockerfile with pipeline)
      dockerfile: pipeline/Dockerfile
    container_name: whoapp-ws-bridge
    command: python -u ws_bridge.py
    environment:
      <<: *common-env
      WS_PORT: 8765
    networks:
      - whoapp-net
    ports:
      - "8765:8765"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: whoapp-simulator
    environment:
      <<: *common-env
      SIM_SPEED: ${SIM_SPEED:-1.0}
    networks:
      - whoapp-net
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    profiles: ["demo"]

  # ── Frontend ─────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: whoapp-dashboard
    environment:
      VITE_WS_URL: ws://localhost:8765
      VITE_API_URL: http://localhost:8766
    networks:
      - whoapp-net
    ports:
      - "3000:3000"
    depends_on:
      - ws-bridge
    restart: unless-stopped

  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: whoapp-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_PASSWORD:-whoapp1234}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      INFLUX_TOKEN: ${INFLUX_TOKEN:-whoapp-super-secret-token}
      INFLUX_URL: http://influxdb:8086
      INFLUX_ORG: ${INFLUX_ORG:-whoapp}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-network_flows}
    networks:
      - whoapp-net
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

networks:
  whoapp-net:
    driver: bridge

volumes:
  redis_data:
  influx_data:
  grafana_data:
  pcap_data:
